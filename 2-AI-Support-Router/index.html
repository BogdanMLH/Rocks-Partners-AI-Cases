<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Casino Support</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e8e8f0;
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #13131f;
      border-bottom: 1px solid #2a2a42;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-ai {
      width: 36px;
      height: 36px;
      background: #e94560;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info p:first-child { font-size: 15px; font-weight: 500; }
    .header-info p:last-child  { font-size: 12px; color: #3ecf8e; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a42 transparent;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 75%;
      animation: fadeUp 0.25s ease forwards;
      opacity: 0;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.ai   .bubble { background: #1c1c2e; border: 1px solid #2a2a42; border-top-left-radius: 4px; }
    .message.user .bubble { background: #2a1040; border: 1px solid #3a2a5a; border-top-right-radius: 4px; }

    .typing {
      display: none;
      gap: 10px;
      align-items: center;
    }

    .typing.visible { display: flex; }

    .dots {
      background: #1c1c2e;
      border: 1px solid #2a2a42;
      border-radius: 16px;
      border-top-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
    }

    .dots span {
      width: 6px; height: 6px;
      background: #8888aa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }

    .input-bar {
      background: #13131f;
      border-top: 1px solid #2a2a42;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #msg-input {
      flex: 1;
      background: #1c1c2e;
      border: 1px solid #2a2a42;
      border-radius: 24px;
      color: #e8e8f0;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    #msg-input:focus   { border-color: #e94560; }
    #msg-input::placeholder { color: #8888aa; }

    .send-btn {
      width: 44px; height: 44px;
      background: #e94560;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover  { background: #c73652; }
    .send-btn:active { transform: scale(0.93); }

    .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>

<header>
  <div class="avatar-ai">🎰</div>
  <div class="header-info">
    <p>Casino Support</p>
    <p>● Online</p>
  </div>
</header>

<div class="messages" id="messages">
  <div class="message ai">
    <div class="bubble">Hey! Welcome to Casino Support 🎰 How can I help you today?</div>
  </div>
</div>

<div class="typing" id="typing">
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<div class="input-bar">
  <input id="msg-input" type="text" placeholder="Type a message..."/>
  <button class="send-btn" onclick="send()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const WEBHOOK = 'https://n8n.joblyapp.com/webhook/6a4a49a8-3b79-4e96-b58a-00ae8118fe29';

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const typingEl   = document.getElementById('typing');

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage('user', text);
    inputEl.value = '';
    typingEl.classList.add('visible');
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res  = await fetch(WEBHOOK, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text })
      });
      const data  = await res.json().catch(() => ({}));
      const reply = data.reply || data.message || data.output || data.text
                 || data.choices?.[0]?.message?.content
                 || 'We have received your message and a member of our support team will contact you shortly. If this is an urgent matter, please do not hesitate to reach out again.';
      typingEl.classList.remove('visible');
      addMessage('ai', reply);
    } catch {
      typingEl.classList.remove('visible');
      addMessage('ai', 'Something went wrong. Please try again.');
    }
  }

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') send();
  });
</script>

</body>
</html>
